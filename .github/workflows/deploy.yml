name: 🚀 Deploy Frontend (Nuxt)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy frontend via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "🚀 START DEPLOY FRONTEND"

            cd /var/www/frontend
            git pull origin main

            npm install
            npm run generate

            # bersihin dulu
            rm -rf /var/www/frontend/public/*

            # copy hasil build (FIXED)
            cp -r .output/public/. /var/www/frontend/public/

            systemctl restart nginx

            echo "✅ FRONTEND DEPLOY DONE"